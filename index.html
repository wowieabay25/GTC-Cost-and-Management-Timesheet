  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

id-template-columns:repeat(3,1fr);gap:13px;margin-bottom:14px\"><\u002Fdiv>\n  <div class=\"g2\">\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Total Hours per Employee<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"c-emp-bars\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">OT Hours per Employee<\u002Fspan><span class=\"pb pb-alert\">gross &gt;9h or weekend<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"c-ot-bars\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"g2\">\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Category Distribution — Team Total<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"c-cat-bars\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Under-Hrs vs Weekend Days<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"c-uw-bars\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"g2\">\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Challenge Level Distribution<\u002Fspan><span class=\"pb pb-blue\">% of logged hours<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"c-chal-bars\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Late-Night Work (after 22:00)<\u002Fspan><span class=\"pb pb-alert\">task start count<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"c-late-bars\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- VIEW 3: TASK ANALYSIS -->\n<div id=\"view-tasks\" class=\"view\">\n  <div class=\"controls\">\n    <div class=\"ctrl-grp\">\n      <div class=\"ctrl-lbl\">Employee<\u002Fdiv>\n      <div class=\"btn-row\" id=\"ta-emp-row\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ctrl-grp\">\n      <div class=\"ctrl-lbl\">Period<\u002Fdiv>\n      <div class=\"btn-row\" id=\"ta-month-row\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"stats-strip\" style=\"grid-template-columns:repeat(5,1fr);margin-bottom:14px\" id=\"ta-stats\"><\u002Fdiv>\n\n  <div class=\"sr\"><span>Task Breakdown<\u002Fspan><\u002Fdiv>\n  <div class=\"g32\" style=\"margin-bottom:14px\">\n    <div class=\"panel\">\n      <div class=\"ph\"><span class=\"pt\">Tasks Ranked by Total Hours<\u002Fspan><span class=\"pb pb-alert\" id=\"ta-task-badge\">—<\u002Fspan><\u002Fdiv>\n      <div style=\"overflow-x:auto\"><table class=\"dt\"><thead><tr><th>#<\u002Fth><th>Task Description<\u002Fth><th>Category<\u002Fth><th>Total Hrs<\u002Fth><th>Times<\u002Fth><th>Who<\u002Fth><th>Intensity<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"task-tbody\"><\u002Ftbody><\u002Ftable><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Hours by Category<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"task-cat-bars\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Marathon Tasks ≥8h single session<\u002Fspan><span class=\"pb pb-alert\">burnout risk<\u002Fspan><\u002Fdiv><div style=\"overflow-x:auto\"><table class=\"dt\"><thead><tr><th>Employee<\u002Fth><th>Date<\u002Fth><th>Task<\u002Fth><th>Hrs<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"marathon-tbody\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sr\"><span>Daily Activities Log<\u002Fspan><\u002Fdiv>\n  <div class=\"panel\" style=\"margin-bottom:14px\">\n    <div class=\"ph\">\n      <span class=\"pt\">Day-by-Day Drill-Down<\u002Fspan>\n      <span class=\"pb pb-blue\" id=\"ta-daily-badge\">—<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"overflow-x:auto\">\n      <table class=\"dt\">\n        <thead><tr>\n          <th>Employee<\u002Fth><th>Date<\u002Fth><th>Day<\u002Fth>\n          <th>In<\u002Fth><th>Out<\u002Fth><th>Net Hrs<\u002Fth>\n          <th>Tasks<\u002Fth><th>Top Activity<\u002Fth><th>Category<\u002Fth><th>Flag<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody id=\"ta-daily-tbody\"><\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sr\"><span>Managerial Intelligence<\u002Fspan><\u002Fdiv>\n  <div class=\"g3\">\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Administrative Drift Index<\u002Fspan><span class=\"pb pb-warn\">Ad Hoc % of total<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"drift-bars\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Recurring High-Effort Tasks<\u002Fspan><span class=\"pb pb-blue\">automation candidates<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"recur-bars\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Value-Add vs Non-Value-Add<\u002Fspan><span class=\"pb pb-ok\">team split<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"va-bars\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- VIEW 4: HEATMAP -->\n<div id=\"view-heatmap\" class=\"view\">\n  <div class=\"sr\"><span>Team Hours Heatmap<\u002Fspan><\u002Fdiv>\n  <div class=\"controls\" style=\"margin-bottom:14px\">\n    <div class=\"ctrl-grp\">\n      <div class=\"ctrl-lbl\">View Mode<\u002Fdiv>\n      <div class=\"btn-row\" id=\"hm-mode-row\">\n        <button class=\"pill active\" id=\"hm-btn-continuous\" onclick=\"setHeatmapMode('continuous',this)\">Continuous<\u002Fbutton>\n        <button class=\"pill\" id=\"hm-btn-monthly\" onclick=\"setHeatmapMode('monthly',this)\">Monthly<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ctrl-grp\" id=\"hm-month-grp\" style=\"display:none\">\n      <div class=\"ctrl-lbl\">Month<\u002Fdiv>\n      <div class=\"btn-row\" id=\"hm-month-row\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Daily Hours per Employee<\u002Fspan><span class=\"pb pb-alert\">darker = more hours · gold border = weekend<\u002Fspan><\u002Fdiv>\n    <div class=\"heatmap-wrap\" style=\"overflow-x:auto;position:relative\">\n      <table class=\"heatmap\" id=\"heatmap-tbl\" style=\"border-collapse:collapse\"><\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"g2\">\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Daily Team Total Hours<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"team-daily-bars\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Legend<\u002Fspan><\u002Fdiv><div style=\"padding:14px;font-family:var(--mono);font-size:9px;line-height:2.4;color:var(--ink2)\">\n      <div><span style=\"display:inline-block;width:18px;height:11px;background:var(--surface2);border:1px solid var(--rule);vertical-align:middle;margin-right:6px\"><\u002Fspan>0h — no log<\u002Fdiv>\n      <div><span style=\"display:inline-block;width:18px;height:11px;background:rgba(26,107,74,0.08);border:1px solid var(--rule);vertical-align:middle;margin-right:6px\"><\u002Fspan>&lt; 4h<\u002Fdiv>\n      <div><span style=\"display:inline-block;width:18px;height:11px;background:rgba(26,107,74,0.2);border:1px solid var(--rule);vertical-align:middle;margin-right:6px\"><\u002Fspan>4 – 7h<\u002Fdiv>\n      <div><span style=\"display:inline-block;width:18px;height:11px;background:rgba(26,107,74,0.38);border:1px solid var(--rule);vertical-align:middle;margin-right:6px\"><\u002Fspan>8 – 9h (baseline)<\u002Fdiv>\n      <div><span style=\"display:inline-block;width:18px;height:11px;background:rgba(181,134,13,0.25);border:1px solid var(--rule);vertical-align:middle;margin-right:6px\"><\u002Fspan>10 – 12h (OT)<\u002Fdiv>\n      <div><span style=\"display:inline-block;width:18px;height:11px;background:rgba(200,66,26,0.22);border:1px solid var(--rule);vertical-align:middle;margin-right:6px\"><\u002Fspan>13 – 15h (high OT)<\u002Fdiv>\n      <div><span style=\"display:inline-block;width:18px;height:11px;background:rgba(200,66,26,0.45);border:1px solid var(--rule);vertical-align:middle;margin-right:6px\"><\u002Fspan>&gt; 15h (extreme)<\u002Fdiv>\n      <div style=\"margin-top:4px;color:var(--ink3);font-size:8px\">Gold-bordered cells = weekend work<\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<!-- VIEW 5: UNDER-HOURS REPORT -->\n<div id=\"view-report\" class=\"view\">\n  <div class=\"sr\"><span>Under-Hours Report<\u002Fspan><\u002Fdiv>\n  <div class=\"controls\" style=\"margin-bottom:14px\">\n    <div class=\"ctrl-grp\">\n      <div class=\"ctrl-lbl\">Month<\u002Fdiv>\n      <div class=\"btn-row\" id=\"rpt-month-row\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ctrl-grp\">\n      <div class=\"ctrl-lbl\">Employee<\u002Fdiv>\n      <div class=\"btn-row\" id=\"rpt-emp-row\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stats-strip\" style=\"grid-template-columns:repeat(5,1fr);margin-bottom:14px\" id=\"rpt-stats\"><\u002Fdiv>\n  <div class=\"panel\">\n    <div class=\"ph\">\n      <span class=\"pt\">Under-Hours Days Detail<\u002Fspan>\n      <span class=\"pb pb-alert\" id=\"rpt-badge\">—<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"overflow-x:auto\">\n      <table class=\"dt\">\n        <thead><tr>\n          <th>Employee<\u002Fth><th>Date<\u002Fth><th>Day<\u002Fth>\n          <th>Hours Logged<\u002Fth><th>Shortfall<\u002Fth><th>Tasks<\u002Fth><th>Status<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody id=\"rpt-tbody\"><\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"g2\" style=\"margin-top:14px\">\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Under-Hours Count per Employee<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"rpt-emp-bars\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"panel\"><div class=\"ph\"><span class=\"pt\">Shortfall Hours per Employee<\u002Fspan><\u002Fdiv><div class=\"bc-wrap\" id=\"rpt-shortfall-bars\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n<div class=\"footer\">TIMESHEET VALIDATOR · GTC EXPORT TUNA · CENTURY PACIFIC FOOD INC · FEB–MAR 2026<\u002Fdiv>\n\n<script>\n\n// ── CONFIG ────────────────────────────────────────────────────────────────\nconst CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQDfghXY8qrrl67BoEqbgyVYLj0SUgeYDhfc_RK-VdJTyr_jrcG3D_o1pOQEUoUwcJQVGkE6yX3ozow/pub?output=csv';\nconst CACHE_KEY = 'gtc_ts_v5';\n\n// ── EMBEDDED FALLBACK ─────────────────────────────────────────────────────\nconst EMBEDDED = { perPerson:{}, topTasks:[], catByPM:{}, chalDist:{}, lateNight:{}, employees:[], months:[], totalRecords:0, fetchedAt:null };\n\n// ── STATE ─────────────────────────────────────────────────────────────────\nlet D = null;\nlet iEmp = '', iMonth = '', cMonth = 'all';\n\n// ── INIT ──────────────────────────────────────────────────────────────────\nwindow.addEventListener('DOMContentLoaded', () => {\n  // STEP 1: Load instantly from cache or embedded data (zero wait)\n  const cached = loadCache();\n  if (cached) {\n    D = cached;\n    setStatus('Cached · ' + fmtStatusDate(D.fetchedAt));\n    buildUI();\n    document.getElementById('loading-overlay').style.display = 'none';\n  } else {\n    // No cache — show overlay and use embedded while fetching\n    document.getElementById('loading-overlay').style.display = 'flex';\n    D = EMBEDDED;\n    setStatus('Loading…');\n    buildUI();\n  }\n\n  // STEP 2: Fetch fresh CSV in background — update silently when ready\n  const PROXIES = [\n    'https://corsproxy.io/?url=',\n    'https://api.allorigins.win/raw?url=',\n    'https://api.codetabs.com/v1/proxy?quest='\n  ];\n  function tryFetch(url) {\n    return fetch(url, { signal: AbortSignal.timeout(15000) })\n      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); });\n  }\n  function tryWithProxies(proxies, encoded) {\n    if (!proxies.length) return Promise.reject(new Error('All proxies failed'));\n    return tryFetch(proxies[0] + encoded).catch(() => tryWithProxies(proxies.slice(1), encoded));\n  }\n\n  tryFetch(CSV_URL)\n    .catch(() => tryWithProxies(PROXIES, encodeURIComponent(CSV_URL)))\n    .then(csv => {\n      const fresh = processCSV(csv);\n      const isNew = !D || fresh.totalRecords !== D.totalRecords;\n      saveCache(fresh);\n      D = fresh;\n      if (isNew) {\n        buildUI();\n        showToast('↑ Data updated from Google Sheets', 'success');\n      }\n      setStatus('Live · ' + fmtStatusDate(D.fetchedAt));\n      document.getElementById('loading-overlay').style.display = 'none';\n    })\n    .catch(err => {\n      console.warn('Google Sheets fetch failed:', err.message);\n      if (!cached) {\n        D = EMBEDDED;\n        buildUI();\n      }\n      setStatus((cached ? 'Cached' : 'Offline') + ' · ' + fmtStatusDate(D.fetchedAt));\n      document.getElementById('loading-overlay').style.display = 'none';\n    });\n});\n\nfunction fmtStatusDate(iso) {\n  if (!iso) return '';\n  return new Date(iso).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});\n}\n\nfunction loadCache() {\n  try {\n    const raw = localStorage.getItem(CACHE_KEY);\n    if (!raw) return null;\n    const parsed = JSON.parse(raw);\n    // Cache valid for 24 hours\n    const age = Date.now() - new Date(parsed.fetchedAt).getTime();\n    if (age > 86400000) return null;\n    return parsed;\n  } catch(e) { return null; }\n}\n\nfunction saveCache(data) {\n  try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch(e) {}\n}\n\n\n\n\n// ── STATUS & TOAST ────────────────────────────────────────────────────────\nfunction setStatus(label) {\n  document.getElementById('status-label').textContent = label;\n  document.getElementById('last-updated-box').innerHTML = D.fetchedAt ? 'Data as of<br>' + new Date(D.fetchedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';\n}\n\nfunction showToast(msg, type='info') {\n  const t = document.getElementById('toast');\n  t.textContent = msg;\n  t.className = 'toast ' + type + ' show';\n  setTimeout(() => t.classList.remove('show'), 3500);\n}\n\n// ── VIEW SWITCHER ─────────────────────────────────────────────────────────\nfunction showView(id, el) {\n  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));\n  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));\n  document.getElementById('view-' + id).classList.add('active');\n  el.classList.add('active');\n  if (id === 'heatmap') { buildHeatmapMonthBtns(); buildHeatmap(); }\n  if (id === 'tasks') buildTaskView();\n  if (id === 'consolidated') renderConsolidated();\n  if (id === 'report') buildReportView();\n}\n\n// ── HELPERS ───────────────────────────────────────────────────────────────\nconst isWE = d => d === 'Saturday' || d === 'Sunday';\nconst isLv = ts => ts.some(t => /sick|leave|lwp|absent/i.test(t.t));\nfunction computeOT(h, we) { if(we) return h; const g=h+1; return g>9?g-9:0; }\nfunction getDays(emp, month) {\n  if (month==='all') return D.months.flatMap(m => D.perPerson[emp]?.[m]||[]);\n  return D.perPerson[emp]?.[month]||[];\n}\nconst SHORT = n => { const p=n.trim().split(/\\s+/); return p[0]+' '+( p[p.length-1][0]||'')+'.'; };\nconst ML = m => new Date(m+'-15').toLocaleDateString('en-US',{month:'long',year:'numeric'});\n\nfunction catFill(c) {\n  const cl=c.toLowerCase();\n  if(cl.includes('month end')||cl.includes('closing')) return 'f-me';\n  if(cl.includes('post')) return 'f-pc';\n  if(cl.includes('weekly')) return 'f-wk';\n  if(cl.includes('ad hoc')) return 'f-ah';\n  if(cl.includes('audit')) return 'f-au';\n  if(cl.includes('meeting')) return 'f-mt';\n  if(cl.includes('inventory')) return 'f-iv';\n  if(cl.includes('service')) return 'f-sf';\n  return 'f-gn';\n}\nfunction catBadge(c) {\n  const cl=c.toLowerCase();\n  if(cl.includes('month end')||cl.includes('closing')) return 'tb-me';\n  if(cl.includes('post')) return 'tb-pc';\n  if(cl.includes('weekly')) return 'tb-wk';\n  if(cl.includes('ad hoc')) return 'tb-ah';\n  if(cl.includes('audit')) return 'tb-au';\n  if(cl.includes('meeting')) return 'tb-mt';\n  if(cl.includes('inventory')) return 'tb-iv';\n  if(cl.includes('service')) return 'tb-sf';\n  return '';\n}\nfunction makeBar(lbl, val, maxVal, cls, lblW='130px') {\n  const pct=Math.min((val/Math.max(maxVal,0.1))*100,100);\n  return '<div class=\"bc-row\"><div class=\"bc-lbl\" style=\"width:'+lblW+'\" title=\"'+lbl+'\">'+lbl+'<\u002Fdiv><div class=\"bc-track\"><div class=\"bc-fill '+cls+'\" style=\"width:'+pct+'%\">'+(val>=maxVal*0.12?val.toFixed(1)+'h':'')+'<\u002Fdiv><\u002Fdiv><div class=\"bc-val\">'+val.toFixed(1)+'h<\u002Fdiv><\u002Fdiv>';\n}\nfunction makeScore(score) {\n  const sc=score>=80?'var(--accent2)':score>=60?'var(--gold)':'var(--accent)';\n  const sr=score>=80?'High Performer':score>=60?'Satisfactory':'Needs Review';\n  const circ=2*Math.PI*22,off=circ-(score/100)*circ;\n  return '<div class=\"score-ring\"><svg width=\"60\" height=\"60\" viewBox=\"0 0 60 60\"><circle cx=\"30\" cy=\"30\" r=\"22\" fill=\"none\" stroke=\"var(--rule)\" stroke-width=\"4\"/><circle cx=\"30\" cy=\"30\" r=\"22\" fill=\"none\" stroke=\"'+sc+'\" stroke-width=\"4\" stroke-dasharray=\"'+circ+'\" stroke-dashoffset=\"'+off+'\" stroke-linecap=\"round\"/><\u002Fsvg><div class=\"sc-center\"><div class=\"sc-num\" style=\"color:'+sc+'\">'+score+'<\u002Fdiv><div class=\"sc-lbl\">/100<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"sc-desc\"><strong style=\"color:'+sc+'\">'+sr+'<\u002Fstrong><br>'+(score>=80?'Strong output & docs.':score>=60?'Acceptable performance.':'Attention required.')+'<\u002Fdiv>';\n}\n\n// ── BUILD UI ──────────────────────────────────────────────────────────────\nfunction buildUI() {\n  buildEmpButtons();\n  buildMonthBtns();\n  renderIndividual();\n  buildConsolidatedMonthBtns();\n  buildHeatmapMonthBtns();\n  buildReportMonthBtns();\n  buildTaskFilterBtns();\n}\n\n// ── INDIVIDUAL ────────────────────────────────────────────────────────────\nfunction buildEmpButtons() {\n  const row=document.getElementById('i-emp-row'); row.innerHTML='';\n  D.employees.forEach((e,i) => {\n    const b=document.createElement('button');\n    b.className='pill'+(i===0?' active':'');\n    b.textContent=SHORT(e); b.title=e;\n    b.onclick=()=>{ iEmp=e; document.querySelectorAll('#i-emp-row .pill').forEach((x,j)=>x.classList.toggle('active',j===D.employees.indexOf(e))); buildMonthBtns(); renderIndividual(); };\n    row.appendChild(b);\n  });\n  iEmp=D.employees[0];\n}\nfunction buildMonthBtns() {\n  if(!D.months.includes(iMonth)) iMonth=D.months[0];\n  const row=document.getElementById('i-month-row'); row.innerHTML='';\n  D.months.forEach(m => {\n    const b=document.createElement('button');\n    b.className='pill'+(m===iMonth?' m-active':'');\n    b.textContent=ML(m);\n    b.onclick=()=>{ iMonth=m; document.querySelectorAll('#i-month-row .pill').forEach(x=>x.classList.remove('m-active')); b.classList.add('m-active'); renderIndividual(); };\n    row.appendChild(b);\n  });\n}\nfunction renderIndividual() {\n  const days=D.perPerson[iEmp]?.[iMonth]||[];\n  const wdays=days.filter(d=>!isWE(d.dow)),wends=days.filter(d=>isWE(d.dow));\n  const totalH=days.reduce((s,d)=>s+d.total_h,0);\n  const otH=days.reduce((s,d)=>s+computeOT(d.total_h,isWE(d.dow)),0);\n  const avgH=totalH/Math.max(days.length,1);\n  const underD=wdays.filter(d=>!isLv(d.tasks)&&d.total_h<8&&d.total_h>0).length;\n  const totalT=days.reduce((s,d)=>s+d.task_count,0);\n\n  document.getElementById('i-stats').innerHTML=\n    '<div class=\"stat\"><div class=\"stat-val\">'+days.length+'<\u002Fdiv><div class=\"stat-lbl\">Days Logged<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat\"><div class=\"stat-val\">'+totalH.toFixed(1)+'h<\u002Fdiv><div class=\"stat-lbl\">Total Hours<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-green\"><div class=\"stat-val\">'+avgH.toFixed(1)+'h<\u002Fdiv><div class=\"stat-lbl\">Avg / Day<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-accent\"><div class=\"stat-val\">'+otH.toFixed(1)+'h<\u002Fdiv><div class=\"stat-lbl\">OT Hours<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-gold\"><div class=\"stat-val\">'+wends.length+'<\u002Fdiv><div class=\"stat-lbl\">Weekend Days<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-blue\"><div class=\"stat-val\">'+underD+'<\u002Fdiv><div class=\"stat-lbl\">Under-Hrs Days<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-purple\"><div class=\"stat-val\">'+totalT+'<\u002Fdiv><div class=\"stat-lbl\">Tasks Logged<\u002Fdiv><\u002Fdiv>';\n\n  const tbody=document.getElementById('i-tbody'); tbody.innerHTML='';\n  days.forEach(d => {\n    const we=isWE(d.dow),lv=isLv(d.tasks),ot=computeOT(d.total_h,we);\n    const under=!we&&!lv&&d.total_h<8&&d.total_h>0,extreme=d.total_h>=14;\n    let rc=''; if(we)rc='weekend'; else if(under)rc='under-h'; else if(ot>0)rc='ot-r';\n    let fg='';\n    if(lv)fg='<span class=\"flag f-sp\">LEAVE<\u002Fspan>';\n    else if(extreme)fg='<span class=\"flag f-ex\">EXTREME OT<\u002Fspan>';\n    else if(we&&d.total_h>0)fg='<span class=\"flag f-wk\">WEEKEND OT<\u002Fspan>';\n    else if(under)fg='<span class=\"flag f-un\">UNDER-HRS<\u002Fspan>';\n    else if(ot>0)fg='<span class=\"flag f-ot\">OT<\u002Fspan>';\n    else fg='<span class=\"flag f-ok\">COMPLIANT<\u002Fspan>';\n    const hColor=lv?'var(--ink)':extreme?'var(--accent)':under?'var(--accent)':ot>0?'var(--blue)':'var(--accent2)';\n    const tr=document.createElement('tr'); tr.className=rc;\n    tr.title=d.tasks.map(t=>'• '+t.t+' ('+(t.h||'?')+'h)').join('\\n');\n    tr.style.cursor='pointer';\n    tr.innerHTML='<td style=\"font-family:var(--mono);font-size:10px;font-weight:600;color:'+(we?'var(--gold)':'var(--ink2)')+'\">'+d.dow.substring(0,3).toUpperCase()+'<\u002Ftd>'+\n      '<td style=\"font-family:var(--mono);font-size:9px;color:var(--ink3)\">'+d.date.substring(5)+'<\u002Ftd>'+\n      '<td style=\"font-family:var(--mono);font-size:10px\">'+(d.first_in||'—')+'<\u002Ftd>'+\n      '<td style=\"font-family:var(--mono);font-size:10px\">'+(d.last_out||'—')+'<\u002Ftd>'+\n      '<td style=\"font-family:var(--mono);font-size:12px;font-weight:600;color:'+hColor+'\">'+d.total_h.toFixed(1)+'h<\u002Ftd>'+\n      '<td style=\"font-family:var(--mono);font-size:9px;color:var(--blue)\">'+(ot>0?'+'+ot.toFixed(1)+'h':'')+'<\u002Ftd>'+\n      '<td style=\"font-size:10px;color:var(--ink3)\">'+d.task_count+'<\u002Ftd>'+\n      '<td>'+fg+'<\u002Ftd>';\n    tbody.appendChild(tr);\n  });\n\n  const iss=days.filter(d=>!isWE(d.dow)&&!isLv(d.tasks)&&d.total_h<8&&d.total_h>0).length;\n  const cb=document.getElementById('i-cbadge');\n  cb.textContent=iss===0?'COMPLIANT':iss+' UNDER-HRS';\n  cb.className='pb '+(iss===0?'pb-ok':'pb-alert');\n\n  const maxH=Math.max(...days.map(d=>d.total_h),12);\n  const otPct=(9/(maxH+2))*100;\n  document.getElementById('i-bars').innerHTML=days.map(d=>{\n    const we=isWE(d.dow),cls=we?'f-we':d.total_h>=14?'f-xt':d.total_h>9?'f-ov':d.total_h<4?'f-ud':'f-nm';\n    const pct=Math.min((d.total_h/(maxH+2))*100,100);\n    return '<div class=\"bc-row\"><div class=\"bc-lbl\" style=\"width:68px\">'+d.date.substring(5)+' '+d.dow.substring(0,3)+'<\u002Fdiv><div class=\"bc-track\"><div class=\"bc-fill '+cls+'\" style=\"width:'+pct+'%\">'+(d.total_h>=3?d.total_h.toFixed(1)+'h':'')+'<\u002Fdiv>'+(we?'':'<div class=\"bc-marker\" style=\"left:'+otPct+'%\"><\u002Fdiv>')+'<\u002Fdiv><\u002Fdiv>';\n  }).join('');\n\n  const expH=wdays.length*8,util=Math.min(totalH/Math.max(expH,1),1.1)*38;\n  const tq=days.reduce((s,d)=>s+d.tasks.reduce((ts,t)=>ts+(t.t.split(' ').length>=5?10:5),0)/Math.max(d.tasks.length,1),0)/Math.max(days.length,1)/10*42;\n  const pen=Math.max(0,20-underD*3);\n  document.getElementById('i-score').innerHTML=makeScore(Math.round(Math.min(util+tq+pen,100)));\n\n  const catH={};\n  days.forEach(d=>d.tasks.forEach(t=>{if(!t.h||t.h<=0)return;t.cat.split(',').map(c=>c.trim()).filter(Boolean).forEach(c=>catH[c]=(catH[c]||0)+t.h);}));\n  const catS=Object.entries(catH).sort((a,b)=>b[1]-a[1]),maxC=catS[0]?.[1]||1;\n  document.getElementById('i-cats').innerHTML=catS.map(([c,h])=>makeBar(c,h,maxC,catFill(c),'120px')).join('');\n\n  const anoms=[];\n  days.forEach(d=>{\n    const we=isWE(d.dow),lv=isLv(d.tasks),ot=computeOT(d.total_h,we);\n    if(d.total_h>=14&&!lv)anoms.push({t:'ex',txt:'<strong>'+d.dow.substring(0,3)+' '+d.date.substring(5)+'<\u002Fstrong>: '+d.total_h.toFixed(1)+'h — extreme hours. Senior OT approval required.'});\n    else if(we&&d.total_h>0)anoms.push({t:'wk',txt:'<strong>'+d.dow.substring(0,3)+' '+d.date.substring(5)+'<\u002Fstrong>: '+d.total_h.toFixed(1)+'h weekend work. Pre-approval needed.'});\n    if(!we&&!lv&&d.total_h<8&&d.total_h>0)anoms.push({t:'un',txt:'<strong>'+d.dow.substring(0,3)+' '+d.date.substring(5)+'<\u002Fstrong>: '+d.total_h.toFixed(1)+'h — below 8h baseline. Leave or deduction applies.'});\n    if(!we&&ot>0&&d.total_h<14)anoms.push({t:'ot',txt:'<strong>'+d.dow.substring(0,3)+' '+d.date.substring(5)+'<\u002Fstrong>: +'+ot.toFixed(1)+'h OT. '+(d.tasks.some(t=>(t.h||0)>=2&&t.t.split(' ').length>=5)?'Task log supports justification.':'Needs supporting detail.')});\n    if(lv)anoms.push({t:'lv',txt:'<strong>'+d.dow.substring(0,3)+' '+d.date.substring(5)+'<\u002Fstrong>: '+d.tasks[0].t+'. Verify leave form filed.'});\n  });\n  const ab=document.getElementById('i-abadge');\n  ab.textContent=anoms.length===0?'CLEAR':anoms.length+' FLAG(S)';\n  ab.className='pb '+(anoms.length===0?'pb-ok':'pb-alert');\n  document.getElementById('i-anomalies').innerHTML=anoms.length===0?\n    '<li class=\"ai-item\"><div style=\"color:var(--accent2);font-family:var(--mono);font-size:10px\">✓ No anomalies.<\u002Fdiv><\u002Fli>':\n    anoms.slice(0,12).map(a=>'<li class=\"ai-item\"><span class=\"at at-'+a.t+'\">'+a.t.toUpperCase()+'<\u002Fspan><div class=\"a-txt\">'+a.txt+'<\u002Fdiv><\u002Fli>').join('');\n}\n\n// ── CONSOLIDATED ──────────────────────────────────────────────────────────\nfunction buildConsolidatedMonthBtns() {\n  const row=document.getElementById('c-month-row'); row.innerHTML='';\n  ['all',...D.months].forEach(m=>{\n    const b=document.createElement('button');\n    b.className='pill'+(m===cMonth?' m-active':'');\n    b.textContent=m==='all'?'All Months':ML(m);\n    b.onclick=()=>{ cMonth=m; document.querySelectorAll('#c-month-row .pill').forEach(x=>x.classList.remove('m-active')); b.classList.add('m-active'); renderConsolidated(); };\n    row.appendChild(b);\n  });\n}\nfunction renderConsolidated() {\n  if(!D)return;\n  const ed=D.employees.map(e=>{\n    const days=getDays(e,cMonth);\n    const wdays=days.filter(d=>!isWE(d.dow)),wends=days.filter(d=>isWE(d.dow));\n    const totalH=days.reduce((s,d)=>s+d.total_h,0);\n    const otH=days.reduce((s,d)=>s+computeOT(d.total_h,isWE(d.dow)),0);\n    const underD=wdays.filter(d=>!isLv(d.tasks)&&d.total_h<8&&d.total_h>0).length;\n    const totalT=days.reduce((s,d)=>s+d.task_count,0);\n    const util=Math.min(totalH/Math.max(wdays.length*8,1)*100,120);\n    return {name:e,short:SHORT(e),days,wdays,wends,totalH,otH,underD,totalT,util:Math.round(util)};\n  });\n  const teamH=ed.reduce((s,e)=>s+e.totalH,0),teamOT=ed.reduce((s,e)=>s+e.otH,0);\n  const teamWE=ed.reduce((s,e)=>s+e.wends.length,0),teamUD=ed.reduce((s,e)=>s+e.underD,0);\n  document.getElementById('c-stats').innerHTML=\n    '<div class=\"stat\"><div class=\"stat-val\">'+D.employees.length+'<\u002Fdiv><div class=\"stat-lbl\">Employees<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat\"><div class=\"stat-val\">'+teamH.toFixed(0)+'h<\u002Fdiv><div class=\"stat-lbl\">Team Total Hours<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-green\"><div class=\"stat-val\">'+(teamH/D.employees.length).toFixed(1)+'h<\u002Fdiv><div class=\"stat-lbl\">Avg / Person<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-accent\"><div class=\"stat-val\">'+teamOT.toFixed(0)+'h<\u002Fdiv><div class=\"stat-lbl\">Team OT Hours<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-gold\"><div class=\"stat-val\">'+teamWE+'<\u002Fdiv><div class=\"stat-lbl\">Weekend Days<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-blue\"><div class=\"stat-val\">'+teamUD+'<\u002Fdiv><div class=\"stat-lbl\">Under-Hrs Days<\u002Fdiv><\u002Fdiv>';\n\n  document.getElementById('c-cards').innerHTML=ed.map(e=>{\n    const uc=e.util>=90?'var(--accent2)':e.util>=70?'var(--gold)':'var(--accent)';\n    return '<div class=\"emp-card\"><div class=\"ec-name\">'+e.short+'<\u002Fdiv><div class=\"ec-meta\">'+e.name+'<\u002Fdiv>'+\n      '<div class=\"ec-stat\"><span class=\"ec-key\">Total Hours<\u002Fspan><span class=\"ec-val\">'+e.totalH.toFixed(1)+'h<\u002Fspan><\u002Fdiv>'+\n      '<div class=\"ec-stat\"><span class=\"ec-key\">OT Hours<\u002Fspan><span class=\"ec-val\" style=\"color:var(--blue)\">'+e.otH.toFixed(1)+'h<\u002Fspan><\u002Fdiv>'+\n      '<div class=\"ec-stat\"><span class=\"ec-key\">Weekend Days<\u002Fspan><span class=\"ec-val\" style=\"color:var(--gold)\">'+e.wends.length+'<\u002Fspan><\u002Fdiv>'+\n      '<div class=\"ec-stat\"><span class=\"ec-key\">Under-Hrs Days<\u002Fspan><span class=\"ec-val\" style=\"color:var(--accent)\">'+e.underD+'<\u002Fspan><\u002Fdiv>'+\n      '<div class=\"ec-stat\"><span class=\"ec-key\">Tasks Logged<\u002Fspan><span class=\"ec-val\">'+e.totalT+'<\u002Fspan><\u002Fdiv>'+\n      '<div class=\"ec-stat\"><span class=\"ec-key\">Utilization<\u002Fspan><span class=\"ec-val\" style=\"color:'+uc+'\">'+e.util+'%<\u002Fspan><\u002Fdiv><\u002Fdiv>';\n  }).join('');\n\n  const maxH2=Math.max(...ed.map(e=>e.totalH)),maxOT=Math.max(...ed.map(e=>e.otH));\n  document.getElementById('c-emp-bars').innerHTML=[...ed].sort((a,b)=>b.totalH-a.totalH).map(e=>makeBar(e.short,e.totalH,maxH2,'f-nm')).join('');\n  document.getElementById('c-ot-bars').innerHTML=[...ed].sort((a,b)=>b.otH-a.otH).map(e=>makeBar(e.short,e.otH,maxOT,'f-xt')).join('');\n\n  const catT={};\n  D.employees.forEach(emp=>{\n    const mos=cMonth==='all'?D.months:[cMonth];\n    mos.forEach(m=>Object.entries(D.catByPM[emp]?.[m]||{}).forEach(([c,h])=>catT[c]=(catT[c]||0)+h));\n  });\n  const catS=Object.entries(catT).sort((a,b)=>b[1]-a[1]),maxCT=catS[0]?.[1]||1;\n  document.getElementById('c-cat-bars').innerHTML=catS.map(([c,h])=>makeBar(c,h,maxCT,catFill(c),'140px')).join('');\n\n  document.getElementById('c-uw-bars').innerHTML=ed.map(e=>{\n    const mx=Math.max(...ed.map(x=>x.underD+x.wends.length),1);\n    return '<div style=\"margin-bottom:8px\"><div style=\"font-family:var(--mono);font-size:8px;color:var(--ink3);margin-bottom:3px\">'+e.short+'<\u002Fdiv>'+\n      '<div class=\"bc-row\" style=\"margin-bottom:2px\"><div class=\"bc-lbl\" style=\"width:80px;font-size:8px\">Under-Hrs<\u002Fdiv><div class=\"bc-track\"><div class=\"bc-fill f-ud\" style=\"width:'+(e.underD/mx*100)+'%\">'+(e.underD>0?e.underD+'d':'')+'<\u002Fdiv><\u002Fdiv><div class=\"bc-val\">'+e.underD+'d<\u002Fdiv><\u002Fdiv>'+\n      '<div class=\"bc-row\"><div class=\"bc-lbl\" style=\"width:80px;font-size:8px\">Weekend OT<\u002Fdiv><div class=\"bc-track\"><div class=\"bc-fill f-we\" style=\"width:'+(e.wends.length/mx*100)+'%\">'+(e.wends.length>0?e.wends.length+'d':'')+'<\u002Fdiv><\u002Fdiv><div class=\"bc-val\">'+e.wends.length+'d<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n  }).join('');\n\n  const cb=document.getElementById('c-chal-bars'); cb.innerHTML='';\n  D.employees.forEach(emp=>{\n    const fn=emp.split(' ')[0],cd=D.chalDist[fn]||{};\n    const tot=Object.values(cd).reduce((s,v)=>s+v,0); if(!tot)return;\n    const pH=((cd['High']||0)/tot*100).toFixed(0),pM=((cd['Medium']||0)/tot*100).toFixed(0),pL=((cd['Low']||0)/tot*100).toFixed(0);\n    cb.innerHTML+='<div class=\"bc-row\" style=\"margin-bottom:6px\"><div class=\"bc-lbl\" style=\"width:80px\">'+SHORT(emp)+'<\u002Fdiv><div class=\"bc-track\" style=\"height:20px;display:flex\">'+\n      '<div style=\"width:'+pH+'%;background:rgba(200,66,26,0.3);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;color:var(--accent)\">'+(pH>8?pH+'%':'')+'<\u002Fdiv>'+\n      '<div style=\"width:'+pM+'%;background:rgba(181,134,13,0.25);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;color:var(--gold)\">'+(pM>8?pM+'%':'')+'<\u002Fdiv>'+\n      '<div style=\"flex:1;background:rgba(26,107,74,0.15);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;color:var(--accent2)\">'+(pL>8?pL+'%':'')+'<\u002Fdiv>'+\n      '<\u002Fdiv><div class=\"bc-val\">'+tot.toFixed(0)+'h<\u002Fdiv><\u002Fdiv>';\n  });\n  cb.innerHTML+='<div style=\"font-family:var(--mono);font-size:8px;color:var(--ink3);padding:4px 0\"><span style=\"color:var(--accent)\">■<\u002Fspan> High &nbsp;<span style=\"color:var(--gold)\">■<\u002Fspan> Medium &nbsp;<span style=\"color:var(--accent2)\">■<\u002Fspan> Low<\u002Fdiv>';\n\n  const ln=D.lateNight,maxLN=Math.max(...Object.values(ln),1);\n  document.getElementById('c-late-bars').innerHTML=Object.entries(ln).sort((a,b)=>b[1]-a[1]).map(([n,v])=>\n    '<div class=\"bc-row\"><div class=\"bc-lbl\" style=\"width:80px\">'+n+'<\u002Fdiv><div class=\"bc-track\"><div class=\"bc-fill f-xt\" style=\"width:'+(v/maxLN*100)+'%\">'+v+' tasks<\u002Fdiv><\u002Fdiv><div class=\"bc-val\" style=\"width:50px\">'+v+'<\u002Fdiv><\u002Fdiv>'\n  ).join('');\n}\n\n// ── TASK VIEW ─────────────────────────────────────────────────────────────\n// ── TASK ANALYSIS FILTERS ─────────────────────────────────────────────────\nlet taEmp = 'all';\nlet taMonth = 'all';\n\nfunction buildTaskFilterBtns() {\n  if(!D) return;\n  // Employee row\n  const eRow = document.getElementById('ta-emp-row'); eRow.innerHTML = '';\n  ['all', ...D.employees].forEach(e => {\n    const b = document.createElement('button');\n    b.className = 'pill' + (e === taEmp ? ' active' : '');\n    b.textContent = e === 'all' ? 'All' : SHORT(e);\n    b.onclick = () => {\n      taEmp = e;\n      document.querySelectorAll('#ta-emp-row .pill').forEach(x => x.classList.remove('active'));\n      b.classList.add('active');\n      buildTaskView();\n    };\n    eRow.appendChild(b);\n  });\n  // Month row: All, each month, YTD\n  const mRow = document.getElementById('ta-month-row'); mRow.innerHTML = '';\n  ['all', ...D.months, 'ytd'].forEach(m => {\n    const b = document.createElement('button');\n    b.className = 'pill' + (m === taMonth ? ' m-active' : '');\n    b.textContent = m === 'all' ? 'All' : m === 'ytd' ? 'YTD' : ML(m);\n    b.onclick = () => {\n      taMonth = m;\n      document.querySelectorAll('#ta-month-row .pill').forEach(x => x.classList.remove('m-active'));\n      b.classList.add('m-active');\n      buildTaskView();\n    };\n    mRow.appendChild(b);\n  });\n}\n\n// Return days matching the current ta filters\nfunction getTADays() {\n  const emps = taEmp === 'all' ? D.employees : [taEmp];\n  // For YTD, include all months (same as all in this dataset, but semantically correct)\n  const months = (taMonth === 'all' || taMonth === 'ytd') ? D.months : [taMonth];\n  const out = [];\n  emps.forEach(emp => {\n    months.forEach(mo => {\n      (D.perPerson[emp]?.[mo] || []).forEach(day => out.push({ emp, ...day }));\n    });\n  });\n  return out;\n}\n\nfunction buildTaskView() {\n  if(!D) return;\n\n  const days = getTADays();\n\n  // ── build a task aggregation from filtered days ──\n  const taskTotals = {};\n  days.forEach(day => {\n    day.tasks.forEach(t => {\n      if (!(t.h > 0)) return;\n      const k = t.t.substring(0, 80);\n      if (!taskTotals[k]) taskTotals[k] = { h: 0, count: 0, people: new Set(), cats: new Set() };\n      taskTotals[k].h += t.h;\n      taskTotals[k].count++;\n      taskTotals[k].people.add(SHORT(day.emp));\n      taskTotals[k].cats.add((t.cat.split(',')[0] || '').trim());\n    });\n  });\n  const filteredTasks = Object.entries(taskTotals)\n    .sort((a, b) => b[1].h - a[1].h)\n    .slice(0, 40)\n    .map(([task, d]) => ({ task, h: Math.round(d.h * 100) / 100, count: d.count, people: [...d.people], cats: [...d.cats] }));\n\n  // ── Stats strip ──\n  const totalH = Math.round(days.reduce((s, d) => s + d.total_h, 0) * 10) / 10;\n  const totalTasks = days.reduce((s, d) => s + d.task_count, 0);\n  const totalDays = days.length;\n  const avgH = totalDays ? Math.round(totalH / totalDays * 10) / 10 : 0;\n  const maraCount = days.reduce((s, d) => s + d.tasks.filter(t => (t.h || 0) >= 8).length, 0);\n  document.getElementById('ta-stats').innerHTML =\n    '<div class=\"stat c-blue\"><div class=\"stat-val\">' + totalH.toFixed(0) + 'h<\u002Fdiv><div class=\"stat-lbl\">Total Hours<\u002Fdiv><\u002Fdiv>' +\n    '<div class=\"stat c-green\"><div class=\"stat-val\">' + avgH.toFixed(1) + 'h<\u002Fdiv><div class=\"stat-lbl\">Avg / Day<\u002Fdiv><\u002Fdiv>' +\n    '<div class=\"stat\"><div class=\"stat-val\">' + totalDays + '<\u002Fdiv><div class=\"stat-lbl\">Days Logged<\u002Fdiv><\u002Fdiv>' +\n    '<div class=\"stat c-gold\"><div class=\"stat-val\">' + totalTasks + '<\u002Fdiv><div class=\"stat-lbl\">Task Entries<\u002Fdiv><\u002Fdiv>' +\n    '<div class=\"stat c-accent\"><div class=\"stat-val\">' + maraCount + '<\u002Fdiv><div class=\"stat-lbl\">Marathon Tasks<\u002Fdiv><\u002Fdiv>';\n\n  // ── Tasks table ──\n  const tbody = document.getElementById('task-tbody'); tbody.innerHTML = '';\n  document.getElementById('ta-task-badge').textContent = filteredTasks.length + ' tasks';\n  filteredTasks.forEach((t, i) => {\n    const ipp = t.h / Math.max(t.count, 1), ic = ipp >= 10 ? 'f-ex' : ipp >= 6 ? 'f-ot' : ipp >= 3 ? 'f-wk' : 'f-ok';\n    const tr = document.createElement('tr'); if (t.h >= 10) tr.className = 'task-row-high';\n    tr.innerHTML = '<td style=\"font-family:var(--mono);font-size:9px;color:var(--ink3)\">' + (i + 1) + '<\u002Ftd>' +\n      '<td style=\"max-width:240px;font-size:11px\">' + t.task + '<\u002Ftd>' +\n      '<td>' + t.cats.slice(0, 1).map(c => '<span class=\"task-badge ' + catBadge(c) + '\">' + c.split(' ')[0] + '<\u002Fspan>').join('') + '<\u002Ftd>' +\n      '<td style=\"font-family:var(--mono);font-size:12px;font-weight:600;color:' + (t.h >= 15 ? 'var(--accent)' : t.h >= 10 ? 'var(--blue)' : 'var(--ink)') + '\">' + t.h.toFixed(1) + 'h<\u002Ftd>' +\n      '<td style=\"font-family:var(--mono);font-size:10px;color:var(--ink3)\">' + t.count + '×<\u002Ftd>' +\n      '<td style=\"font-size:10px;color:var(--ink3)\">' + t.people.join(', ') + '<\u002Ftd>' +\n      '<td><span class=\"flag ' + ic + '\">' + ipp.toFixed(1) + 'h/ea<\u002Fspan><\u002Ftd>';\n    tbody.appendChild(tr);\n  });\n\n  // ── Category bars ──\n  const tc = {};\n  filteredTasks.forEach(t => t.cats.forEach(c => tc[c] = (tc[c] || 0) + t.h));\n  const tcS = Object.entries(tc).sort((a, b) => b[1] - a[1]), maxTC = tcS[0]?.[1] || 1;\n  document.getElementById('task-cat-bars').innerHTML = tcS.map(([c, h]) => makeBar(c, h, maxTC, catFill(c), '120px')).join('');\n\n  // ── Marathon tasks ──\n  const mara = [];\n  days.forEach(day => day.tasks.forEach(t => { if ((t.h || 0) >= 8) mara.push({ emp: SHORT(day.emp), date: day.date, task: t.t, h: t.h }); }));\n  mara.sort((a, b) => b.h - a.h);\n  document.getElementById('marathon-tbody').innerHTML = mara.slice(0, 20).map(m => {\n    const hc = m.h >= 15 ? 'var(--accent)' : m.h >= 10 ? 'var(--blue)' : 'var(--gold)';\n    return '<tr><td style=\"font-size:10px\">' + m.emp + '<\u002Ftd><td style=\"font-family:var(--mono);font-size:9px;color:var(--ink3)\">' + m.date.substring(5) + '<\u002Ftd><td style=\"font-size:11px;max-width:180px\">' + m.task.substring(0, 65) + (m.task.length > 65 ? '…' : '') + '<\u002Ftd><td style=\"font-family:var(--mono);font-size:12px;font-weight:600;color:' + hc + '\">' + m.h.toFixed(1) + 'h<\u002Ftd><\u002Ftr>';\n  }).join('');\n\n  // ── Daily Activities ──\n  const sortedDays = [...days].sort((a, b) => a.date.localeCompare(b.date) || a.emp.localeCompare(b.emp));\n  document.getElementById('ta-daily-badge').textContent = sortedDays.length + ' day entries';\n  document.getElementById('ta-daily-tbody').innerHTML = sortedDays.map(day => {\n    const we = isWE(day.dow), lv = isLv(day.tasks);\n    const ot = computeOT(day.total_h, we);\n    const underH = !we && !lv && day.total_h > 0 && day.total_h < 8;\n    const topTask = day.tasks.slice().sort((a, b) => (b.h || 0) - (a.h || 0))[0];\n    const topCat = topTask ? (topTask.cat.split(',')[0] || '').trim() : '';\n    // Flag\n    let flagHtml = '';\n    if (lv) flagHtml = '<span class=\"flag f-sp\">LEAVE<\u002Fspan>';\n    else if (we && day.total_h > 0) flagHtml = '<span class=\"flag f-wk\">WKND<\u002Fspan>';\n    else if (day.total_h >= 14) flagHtml = '<span class=\"flag f-ex\">EXTREME<\u002Fspan>';\n    else if (ot > 0) flagHtml = '<span class=\"flag f-ot\">OT +' + ot.toFixed(1) + 'h<\u002Fspan>';\n    else if (underH) flagHtml = '<span class=\"flag f-un\">UNDER<\u002Fspan>';\n    else if (day.total_h >= 8) flagHtml = '<span class=\"flag f-ok\">OK<\u002Fspan>';\n    else flagHtml = '<span class=\"flag f-sp\">—<\u002Fspan>';\n    // Row color\n    const rowCls = we ? 'weekend' : underH ? 'under-h' : ot > 0 ? 'ot-r' : '';\n    // Tasks detail: show up to 3 tasks as mini list\n    const taskDetail = day.tasks.map(t =>\n      '<div style=\"font-size:9px;color:var(--ink2);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px\" title=\"' + t.t + '\">' +\n      (t.h > 0 ? '<span style=\"font-family:var(--mono);color:var(--blue);font-size:8px\">' + t.h.toFixed(1) + 'h<\u002Fspan> ' : '') + t.t + '<\u002Fdiv>'\n    ).join('');\n\n    return '<tr class=\"' + rowCls + '\">' +\n      '<td style=\"font-weight:600;font-size:11px\">' + SHORT(day.emp) + '<\u002Ftd>' +\n      '<td style=\"font-family:var(--mono);font-size:9px\">' + day.date + '<\u002Ftd>' +\n      '<td style=\"font-family:var(--mono);font-size:9px;color:' + (we ? 'var(--gold)' : 'var(--ink3)') + '\">' + day.dow.substring(0, 3) + '<\u002Ftd>' +\n      '<td style=\"font-family:var(--mono);font-size:9px\">' + (day.first_in || '—') + '<\u002Ftd>' +\n      '<td style=\"font-family:var(--mono);font-size:9px\">' + (day.last_out || '—') + '<\u002Ftd>' +\n      '<td style=\"font-family:var(--mono);font-size:12px;font-weight:600;color:' + (day.total_h >= 14 ? 'var(--accent)' : day.total_h >= 9 ? 'var(--blue)' : underH ? 'var(--gold)' : 'var(--ink)') + '\">' + day.total_h.toFixed(1) + 'h<\u002Ftd>' +\n      '<td>' + taskDetail + '<\u002Ftd>' +\n      '<td style=\"font-size:10px;max-width:160px\">' + (topTask ? topTask.t.substring(0, 45) + (topTask.t.length > 45 ? '…' : '') : '—') + '<\u002Ftd>' +\n      '<td>' + (topCat ? '<span class=\"task-badge ' + catBadge(topCat) + '\">' + topCat.split(' ')[0] + '<\u002Fspan>' : '—') + '<\u002Ftd>' +\n      '<td>' + flagHtml + '<\u002Ftd>' +\n      '<\u002Ftr>';\n  }).join('');\n\n  // ── Drift (filtered) ──\n  const emps = taEmp === 'all' ? D.employees : [taEmp];\n  const months = (taMonth === 'all' || taMonth === 'ytd') ? D.months : [taMonth];\n  const drift = emps.map(emp => {\n    let ah = 0, tot = 0;\n    months.forEach(m => Object.entries(D.catByPM[emp]?.[m] || {}).forEach(([c, h]) => { tot += h; if (c.toLowerCase().includes('ad hoc')) ah += h; }));\n    return { name: SHORT(emp), pct: tot > 0 ? Math.round(ah / tot * 100) : 0 };\n  }).sort((a, b) => b.pct - a.pct);\n  const maxP = Math.max(...drift.map(d => d.pct), 1);\n  document.getElementById('drift-bars').innerHTML = drift.map(d =>\n    '<div class=\"bc-row\"><div class=\"bc-lbl\" style=\"width:80px\">' + d.name + '<\u002Fdiv><div class=\"bc-track\"><div class=\"bc-fill f-ah\" style=\"width:' + (d.pct / maxP * 100) + '%\">' + d.pct + '%<\u002Fdiv><\u002Fdiv><div class=\"bc-val\">' + d.pct + '%<\u002Fdiv><\u002Fdiv>'\n  ).join('') + '<div style=\"font-family:var(--mono);font-size:8px;color:var(--ink3);padding:5px 0\">&gt;30% = drift concern<\u002Fdiv>';\n\n  // ── Recurring (filtered) ──\n  const recur = filteredTasks.filter(t => t.count >= 3 && t.h / t.count >= 2).slice(0, 8);\n  const maxRH = Math.max(...recur.map(r => r.h), 1);\n  document.getElementById('recur-bars').innerHTML = recur.map(r =>\n    '<div class=\"bc-row\"><div class=\"bc-lbl\" style=\"width:130px;font-size:8px\" title=\"' + r.task + '\">' + r.task.substring(0, 20) + '…<\u002Fdiv><div class=\"bc-track\"><div class=\"bc-fill f-pc\" style=\"width:' + (r.h / maxRH * 100) + '%\">' + r.h.toFixed(1) + 'h<\u002Fdiv><\u002Fdiv><div class=\"bc-val\">' + r.count + '×<\u002Fdiv><\u002Fdiv>'\n  ).join('') + '<div style=\"font-family:var(--mono);font-size:8px;color:var(--ink3);padding:5px 0\">High recurrence = automation opportunity<\u002Fdiv>';\n\n  // ── Value-Add (filtered) ──\n  const VA = ['Month End Closing', 'Post-Closing', 'Weekly', 'Audit', 'Inventory Count', 'Service Fee'];\n  let vaH = 0, nvaH = 0;\n  emps.forEach(emp => months.forEach(m => Object.entries(D.catByPM[emp]?.[m] || {}).forEach(([c, h]) => {\n    if (VA.some(v => c.includes(v.split(' ')[0]))) vaH += h; else nvaH += h;\n  })));\n  const maxVA = Math.max(vaH, nvaH);\n  const vaRatio = Math.round(vaH / (vaH + nvaH) * 100) || 0;\n  document.getElementById('va-bars').innerHTML = makeBar('Value-Add', vaH, maxVA, 'f-nm', '110px') + makeBar('Non-Value-Add', nvaH, maxVA, 'f-ah', '110px') +\n    '<div style=\"font-family:var(--mono);font-size:8px;color:var(--ink3);padding:5px 0\">VA ratio: ' + vaRatio + '% · Target: &gt;80%<\u002Fdiv>';\n}\n\n// ── HEATMAP ───────────────────────────────────────────────────────────────\nlet hmMode = 'continuous';\nlet hmMonth = '';\n\nfunction setHeatmapMode(mode, btn) {\n  hmMode = mode;\n  document.querySelectorAll('#hm-mode-row .pill').forEach(b=>b.classList.remove('active'));\n  btn.classList.add('active');\n  document.getElementById('hm-month-grp').style.display = mode==='monthly' ? '' : 'none';\n  buildHeatmap();\n}\n\nfunction buildHeatmapMonthBtns() {\n  if(!D) return;\n  const row = document.getElementById('hm-month-row'); row.innerHTML='';\n  if(!hmMonth) hmMonth = D.months[0];\n  D.months.forEach(m=>{\n    const b=document.createElement('button');\n    b.className='pill'+(m===hmMonth?' m-active':'');\n    b.textContent=ML(m);\n    b.onclick=()=>{\n      hmMonth=m;\n      document.querySelectorAll('#hm-month-row .pill').forEach(x=>x.classList.remove('m-active'));\n      b.classList.add('m-active');\n      buildHeatmap();\n    };\n    row.appendChild(b);\n  });\n}\n\nfunction buildHeatmap() {\n  if(!D)return;\n  const allDates=new Set();\n  if(hmMode==='continuous') {\n    D.employees.forEach(e=>D.months.forEach(m=>(D.perPerson[e]?.[m]||[]).forEach(d=>allDates.add(d.date))));\n  } else {\n    D.employees.forEach(e=>(D.perPerson[e]?.[hmMonth]||[]).forEach(d=>allDates.add(d.date)));\n  }\n  const dates=[...allDates].sort();\n  const lookup={};\n  D.employees.forEach(e=>D.months.forEach(m=>(D.perPerson[e]?.[m]||[]).forEach(d=>{if(!lookup[e])lookup[e]={};lookup[e][d.date]=d.total_h;})));\n\n  const tbl=document.getElementById('heatmap-tbl'); tbl.innerHTML='';\n  const hRow=document.createElement('tr');\n  hRow.innerHTML='<th><\u002Fth>'+dates.map(d=>{\n    const dt=new Date(d+'T12:00:00'),dw=['Su','Mo','Tu','We','Th','Fr','Sa'][dt.getDay()],we=dt.getDay()===0||dt.getDay()===6;\n    return '<th style=\"'+(we?'color:var(--gold)':'')+'\">'+dw+'<br><span style=\"font-size:6px\">'+d.substring(5)+'<\u002Fspan><\u002Fth>';\n  }).join('');\n  tbl.appendChild(hRow);\n\n  D.employees.forEach(e=>{\n    const tr=document.createElement('tr');\n    tr.innerHTML='<td>'+SHORT(e)+'<\u002Ftd>'+dates.map(d=>{\n      const h=lookup[e]?.[d]||0,dt=new Date(d+'T12:00:00'),we=dt.getDay()===0||dt.getDay()===6;\n      const cls=h===0?'hm-0':h<4?'hm-1':h<8?'hm-2':h<10?'hm-3':h<13?'hm-4':h<16?'hm-5':'hm-6';\n      return '<td class=\"'+cls+'\" style=\"'+(we?'border:1px solid rgba(181,134,13,0.5)':'')+'\" title=\"'+SHORT(e)+' · '+d+' · '+(h>0?h.toFixed(1)+'h':'no log')+'\">'+(h>0?h.toFixed(1):'')+'<\u002Ftd>';\n    }).join('');\n    tbl.appendChild(tr);\n  });\n\n  const teamTotals=dates.map(d=>({date:d,total:D.employees.reduce((s,e)=>s+(lookup[e]?.[d]||0),0)}));\n  const maxTD=Math.max(...teamTotals.map(t=>t.total));\n  document.getElementById('team-daily-bars').innerHTML=teamTotals.map(t=>{\n    const dt=new Date(t.date+'T12:00:00'),we=dt.getDay()===0||dt.getDay()===6;\n    const cls=we?'f-we':t.total>=60?'f-xt':t.total>=40?'f-ov':'f-nm';\n    return '<div class=\"bc-row\"><div class=\"bc-lbl\" style=\"width:68px\">'+t.date.substring(5)+'<\u002Fdiv><div class=\"bc-track\"><div class=\"bc-fill '+cls+'\" style=\"width:'+(t.total/maxTD*100)+'%\">'+(t.total>=15?t.total.toFixed(0)+'h':'')+'<\u002Fdiv><\u002Fdiv><div class=\"bc-val\">'+t.total.toFixed(0)+'h<\u002Fdiv><\u002Fdiv>';\n  }).join('');\n}\n\n\n// ── REPORT ────────────────────────────────────────────────────────────────\nlet rptMonth = 'all';\nlet rptEmp = 'all';\n\nfunction buildReportMonthBtns() {\n  if(!D) return;\n  const mRow = document.getElementById('rpt-month-row'); mRow.innerHTML='';\n  const eRow = document.getElementById('rpt-emp-row'); eRow.innerHTML='';\n  // Month buttons\n  ['all',...D.months].forEach(m=>{\n    const b=document.createElement('button');\n    b.className='pill'+(m===rptMonth?' m-active':'');\n    b.textContent=m==='all'?'All Months':ML(m);\n    b.onclick=()=>{ rptMonth=m; document.querySelectorAll('#rpt-month-row .pill').forEach(x=>x.classList.remove('m-active')); b.classList.add('m-active'); buildReportView(); };\n    mRow.appendChild(b);\n  });\n  // Employee buttons\n  ['all',...D.employees].forEach(e=>{\n    const b=document.createElement('button');\n    b.className='pill'+(e===rptEmp?' active':'');\n    b.textContent=e==='all'?'All':SHORT(e);\n    b.onclick=()=>{ rptEmp=e; document.querySelectorAll('#rpt-emp-row .pill').forEach(x=>x.classList.remove('active')); b.classList.add('active'); buildReportView(); };\n    eRow.appendChild(b);\n  });\n}\n\nfunction buildReportView() {\n  if(!D) return;\n  // Gather under-hours days: weekdays, not leave, hours < 8 and > 0\n  const rows = [];\n  D.employees.forEach(emp => {\n    const months = rptMonth==='all' ? D.months : [rptMonth];\n    months.forEach(mo => {\n      (D.perPerson[emp]?.[mo]||[]).forEach(day => {\n        if(rptEmp !== 'all' && emp !== rptEmp) return;\n        const we = isWE(day.dow);\n        const lv = isLv(day.tasks);\n        if(!we && !lv && day.total_h > 0 && day.total_h < 8) {\n          rows.push({ emp, short: SHORT(emp), date: day.date, dow: day.dow,\n            hours: day.total_h, shortfall: Math.round((8 - day.total_h)*100)/100,\n            tasks: day.tasks, month: mo });\n        }\n      });\n    });\n  });\n  rows.sort((a,b) => a.date.localeCompare(b.date) || a.emp.localeCompare(b.emp));\n\n  // Stats\n  const totalDays = rows.length;\n  const totalShortfall = Math.round(rows.reduce((s,r)=>s+r.shortfall,0)*100)/100;\n  const empSet = [...new Set(rows.map(r=>r.emp))];\n  const worstEmp = empSet.length ? empSet.reduce((a,b)=>rows.filter(r=>r.emp===b).length > rows.filter(r=>r.emp===a).length ? b : a, empSet[0]) : '—';\n  const avgHours = rows.length ? Math.round(rows.reduce((s,r)=>s+r.hours,0)/rows.length*100)/100 : 0;\n\n  document.getElementById('rpt-stats').innerHTML =\n    '<div class=\"stat c-accent\"><div class=\"stat-val\">'+totalDays+'<\u002Fdiv><div class=\"stat-lbl\">Under-Hrs Days<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-accent\"><div class=\"stat-val\">'+totalShortfall.toFixed(1)+'h<\u002Fdiv><div class=\"stat-lbl\">Total Shortfall<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-blue\"><div class=\"stat-val\">'+empSet.length+'<\u002Fdiv><div class=\"stat-lbl\">Employees Affected<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat c-gold\"><div class=\"stat-val\">'+avgHours.toFixed(1)+'h<\u002Fdiv><div class=\"stat-lbl\">Avg Hours (under days)<\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat\"><div class=\"stat-val\" style=\"font-size:14px;color:var(--accent)\">'+SHORT(worstEmp)+'<\u002Fdiv><div class=\"stat-lbl\">Most Occurrences<\u002Fdiv><\u002Fdiv>';\n\n  document.getElementById('rpt-badge').textContent = totalDays === 0 ? 'ALL CLEAR' : totalDays + ' DAY(S)';\n  document.getElementById('rpt-badge').className = 'pb ' + (totalDays===0 ? 'pb-ok' : 'pb-alert');\n\n  // Table\n  const tbody = document.getElementById('rpt-tbody');\n  if(rows.length === 0) {\n    tbody.innerHTML = '<tr><td colspan=\"7\" style=\"text-align:center;padding:20px;font-family:var(--mono);font-size:10px;color:var(--accent2)\">✓ No under-hours weekdays found for selected filters.<\u002Ftd><\u002Ftr>';\n  } else {\n    tbody.innerHTML = rows.map(r => {\n      const sev = r.shortfall >= 4 ? 'f-ex' : r.shortfall >= 2 ? 'f-ot' : 'f-wk';\n      const topTask = r.tasks.slice(0,2).map(t=>'<span style=\"font-size:10px;color:var(--ink2)\">'+t.t.substring(0,40)+(t.t.length>40?'…':'')+'<\u002Fspan>').join('<br>');\n      return '<tr class=\"under-h td\">'+\n        '<td style=\"font-weight:600;font-size:11px\">'+r.short+'<\u002Ftd>'+\n        '<td style=\"font-family:var(--mono);font-size:9px\">'+r.date+'<\u002Ftd>'+\n        '<td style=\"font-family:var(--mono);font-size:9px\">'+r.dow.substring(0,3)+'<\u002Ftd>'+\n        '<td style=\"font-family:var(--mono);font-size:12px;font-weight:600;color:var(--gold)\">'+r.hours.toFixed(1)+'h<\u002Ftd>'+\n        '<td><span class=\"flag '+sev+'\">−'+r.shortfall.toFixed(1)+'h<\u002Fspan><\u002Ftd>'+\n        '<td>'+topTask+'<\u002Ftd>'+\n        '<td><span class=\"flag f-un\">Under-Hrs<\u002Fspan><\u002Ftd>'+\n        '<\u002Ftr>';\n    }).join('');\n  }\n\n  // Per-employee bars\n  const empCounts = {}, empShortfalls = {};\n  D.employees.forEach(e=>{ empCounts[SHORT(e)]=0; empShortfalls[SHORT(e)]=0; });\n  rows.forEach(r=>{ empCounts[r.short]=(empCounts[r.short]||0)+1; empShortfalls[r.short]=(empShortfalls[r.short]||0)+r.shortfall; });\n  const maxC = Math.max(...Object.values(empCounts),1);\n  const maxS = Math.max(...Object.values(empShortfalls),1);\n  document.getElementById('rpt-emp-bars').innerHTML = Object.entries(empCounts).sort((a,b)=>b[1]-a[1])\n    .map(([n,v])=>'<div class=\"bc-row\"><div class=\"bc-lbl\" style=\"width:80px\">'+n+'<\u002Fdiv><div class=\"bc-track\"><div class=\"bc-fill f-ud\" style=\"width:'+(v/maxC*100)+'%\">'+(v>0?v+' day'+(v>1?'s':''):'')+'<\u002Fdiv><\u002Fdiv><div class=\"bc-val\">'+v+'d<\u002Fdiv><\u002Fdiv>').join('');\n  document.getElementById('rpt-shortfall-bars').innerHTML = Object.entries(empShortfalls).sort((a,b)=>b[1]-a[1])\n    .map(([n,v])=>'<div class=\"bc-row\"><div class=\"bc-lbl\" style=\"width:80px\">'+n+'<\u002Fdiv><div class=\"bc-track\"><div class=\"bc-fill f-xt\" style=\"width:'+(v/maxS*100)+'%\">'+(v>0?v.toFixed(1)+'h':'')+'<\u002Fdiv><\u002Fdiv><div class=\"bc-val\">'+v.toFixed(1)+'h<\u002Fdiv><\u002Fdiv>').join('');\n}\n\n// ── CSV PROCESSING ───────────────────────────────────────────\n// Full RFC-4180 parser: handles quoted fields with embedded newlines/commas\nfunction parseCSVFull(csvText) {\n  const rows = [];\n  let row = [], cell = '', inQuote = false;\n  for (let i = 0; i < csvText.length; i++) {\n    const ch = csvText[i];\n    if (inQuote) {\n      if (ch === '\"' && csvText[i+1] === '\"') { cell += '\"'; i++; }\n      else if (ch === '\"') { inQuote = false; }\n      else { cell += ch; }\n    } else {\n      if (ch === '\"') { inQuote = true; }\n      else if (ch === ',') { row.push(cell.trim()); cell = ''; }\n      else if (ch === '\\r') { /* skip CR */ }\n      else if (ch === '\\n') { row.push(cell.trim()); rows.push(row); row = []; cell = ''; }\n      else { cell += ch; }\n    }\n  }\n  if (cell.trim() || row.length > 0) { row.push(cell.trim()); if (row.some(c => c)) rows.push(row); }\n  return rows;\n}\n\nfunction processCSV(csvText) {\n  csvText = csvText.replace(/^\\ufeff/, '');\n  const rows = parseCSVFull(csvText);\n  if (rows.length < 2) return {perPerson:{},topTasks:[],catByPM:{},chalDist:{},lateNight:{},employees:[],months:[],totalRecords:0,fetchedAt:new Date().toISOString()};\n  const headers = rows[0].map(h => h.replace(/^\\ufeff/, '').toLowerCase());\n  const idx = {};\n  const MAP = {name:['name'],task:['task'],category:['category'],challenge:['level of challenge','challenge'],start:['start'],end:['end'],hours:['time spent','hours spent','duration','total hours']};\n  headers.forEach((h,i) => { Object.entries(MAP).forEach(([k,v]) => { if (v.some(x => h.includes(x))) idx[k] = i; }); });\n  const records = [];\n  for (let i = 1; i < rows.length; i++) {\n    const cols = rows[i];\n    const name = (cols[idx.name]||'').trim(); if (!name) continue;\n    const start = parseDateTime((cols[idx.start]||'').trim());\n    const end = parseDateTime((cols[idx.end]||'').trim());\n    if (!start) continue;\n    const hoursRaw = idx.hours !== undefined ? parseFloat(cols[idx.hours]||'') : NaN;\n    const calcDur = (end && end > start) ? (end - start) / 3600000 : null;\n    const dur = (!isNaN(hoursRaw) && hoursRaw > 0) ? Math.round(hoursRaw*100)/100 : calcDur;\n    const catRaw = (cols[idx.category]||'').trim();\n    const cats = catRaw.match(/\"([^\"]+)\"/g) ? catRaw.match(/\"([^\"]+)\"/g).map(s=>s.replace(/\"/g,'')) : [(catRaw.replace(/[\\[\\]\"]/g,'')).trim()];\n    const cat = cats.filter(Boolean).join(', ');\n    records.push({name,task:(cols[idx.task]||'').trim(),category:cat,challenge:(cols[idx.challenge]||'').trim(),start,end,date:fmtDate(start),month:fmtMonth(start),dow:getDOW(start),dur:dur!==null?Math.round(dur*100)/100:null});\n  }\n  const byPMD={};\n  records.forEach(r=>{if(!byPMD[r.name])byPMD[r.name]={};if(!byPMD[r.name][r.month])byPMD[r.name][r.month]={};if(!byPMD[r.name][r.month][r.date])byPMD[r.name][r.month][r.date]=[];byPMD[r.name][r.month][r.date].push(r);});\n  const perPerson={};\n  Object.entries(byPMD).forEach(([emp,months])=>{perPerson[emp]={};Object.entries(months).forEach(([mo,days])=>{perPerson[emp][mo]=Object.entries(days).sort().map(([date,tasks])=>{const valid=tasks.filter(t=>t.dur&&t.dur>0);const total=Math.round(valid.reduce((s,t)=>s+t.dur,0)*100)/100;const starts=tasks.map(t=>t.start).filter(Boolean);const ends=tasks.map(t=>t.end).filter(Boolean);return{date,dow:tasks[0].dow,total_h:total,first_in:starts.length?fmtTime(new Date(Math.min(...starts))):null,last_out:ends.length?fmtTime(new Date(Math.max(...ends))):null,task_count:tasks.length,tasks:tasks.map(t=>({t:t.task.substring(0,100),h:t.dur,cat:t.category,ch:t.challenge}))};});});});\n  const taskTotals={};\n  records.filter(r=>r.dur&&r.dur>0).forEach(r=>{const k=r.task.substring(0,80);if(!taskTotals[k])taskTotals[k]={h:0,count:0,people:new Set(),cats:new Set(),months:new Set()};taskTotals[k].h+=r.dur;taskTotals[k].count++;taskTotals[k].people.add(r.name.split(' ')[0]);taskTotals[k].cats.add((r.category.split(',')[0]||'').trim());taskTotals[k].months.add(r.month);});\n  const topTasks=Object.entries(taskTotals).sort((a,b)=>b[1].h-a[1].h).slice(0,40).map(([t,d])=>({task:t,h:Math.round(d.h*100)/100,count:d.count,people:[...d.people],cats:[...d.cats].slice(0,2),months:[...d.months].sort()}));\n  const catByPM={};\n  records.filter(r=>r.dur&&r.dur>0).forEach(r=>{if(!catByPM[r.name])catByPM[r.name]={};if(!catByPM[r.name][r.month])catByPM[r.name][r.month]={};const c=(r.category.split(',')[0]||'').trim();catByPM[r.name][r.month][c]=(catByPM[r.name][r.month][c]||0)+r.dur;});\n  const chalDist={};\n  records.filter(r=>r.dur&&r.dur>0&&r.challenge).forEach(r=>{const fn=r.name.split(' ')[0];if(!chalDist[fn])chalDist[fn]={};chalDist[fn][r.challenge]=(chalDist[fn][r.challenge]||0)+r.dur;});\n  const lateNight={};\n  records.forEach(r=>{if(r.start&&new Date(r.start).getHours()>=22){const fn=r.name.split(' ')[0];lateNight[fn]=(lateNight[fn]||0)+1;}});\n  return{perPerson,topTasks,catByPM,chalDist,lateNight,employees:Object.keys(perPerson),months:[...new Set(records.map(r=>r.month))].sort(),totalRecords:records.length,fetchedAt:new Date().toISOString()};\n}\n\n\n\n// ── UTILS ─────────────────────────────────────────────────────────────────\nfunction parseCSVRow(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='\"'){if(q&&line[i+1]==='\"'){c+='\"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}\nfunction parseDateTime(s){if(!s)return null;const m=s.match(/(\\d+)\\/(\\d+)\\/(\\d+)\\s+(\\d+):(\\d+)\\s*(AM|PM)?/i);if(m){let h=parseInt(m[4]),mn=parseInt(m[5]);const pm=(m[6]||'').toUpperCase()==='PM';if(pm&&h<12)h+=12;if(!pm&&h===12)h=0;return new Date(parseInt(m[3]),parseInt(m[1])-1,parseInt(m[2]),h,mn);}const d=new Date(s);return isNaN(d)?null:d;}\nfunction fmtDate(d){return d?d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'):'';}\nfunction fmtMonth(d){return d?d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'):'';}\nfunction fmtTime(d){return d?String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'):'';}\nfunction getDOW(d){return d?['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]:'';} \n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
